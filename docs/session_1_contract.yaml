session_contract:
  id: session-1
  objective: >
    Replace all B200 (sm_100) hardware specifications with RTX 5090 (sm_120)
    verified specs in SKILL.md, blackwell-cuda-programming.md, and README.md.
    Rewrite the programming guide for consumer Blackwell constraints. Add LLM
    inference section with decode bandwidth analysis and precision roofline table.
  risk_level: medium
  routing: single_agent
  in_scope:
    - SKILL.md hardware spec replacement (B200 → RTX 5090)
    - blackwell-cuda-programming.md full rewrite for sm_120 consumer constraints
    - README.md GPU target and toolchain update
    - LLM inference section in programming guide
    - tcgen05/TMEM/2CTA availability verification on sm_120
  out_of_scope:
    - Helper Python scripts (Session 3)
    - Reference docs in reference/ directory (Session 2)
    - Metric name validation (Session 3)
    - End-to-end profiling validation (Session 4)
    - Any code execution beyond compile-test of tcgen05 PTX
  blast_radius:
    allowed_files:
      - SKILL.md
      - blackwell-cuda-programming.md
      - README.md
    forbidden_files:
      - helpers/*
      - reference/*
      - .gitignore
  invariants:
    - File structure (SKILL.md, blackwell-cuda-programming.md, helpers/, reference/) preserved
    - Six-dimension analysis framework structure preserved in any references
    - No pip dependencies introduced
    - All hardware numbers match PRD §4.1 verified specs
  acceptance_criteria:
    - "grep -ri 'sm_100\\|B200' SKILL.md blackwell-cuda-programming.md README.md returns empty"
    - "grep -i 'sm_120' SKILL.md returns matches in compile target section"
    - Hardware parameter table in SKILL.md matches cudaDeviceProp verified values
    - LLM inference section exists in blackwell-cuda-programming.md with decode analysis
    - Precision roofline table covers FP4, FP8, INT8, BF16, FP16, TF32, FP32
    - Each of tcgen05, TMEM, 2CTA has documented availability status for sm_120
  deterministic_checks:
    - "grep -rci 'sm_100\\|B200\\|b200' SKILL.md blackwell-cuda-programming.md README.md | grep -v ':0$' # must be empty"
    - "grep -c 'sm_120' SKILL.md # must be >= 1"
    - "grep -c '170' SKILL.md # SM count must appear"
    - "grep -c '1792\\|1.792\\|1.8 TB' blackwell-cuda-programming.md # bandwidth must appear"
  review_axes:
    - correctness
    - architecture
    - performance
  adversarial_cases:
    - A B200 number (e.g., 148 SMs, 228 KB shared, 8 TB/s) survives in a code comment or inline example
    - tcgen05 PTX fails to compile for sm_120 but the section is written as if it works
    - TMEM section copied verbatim from B200 guide without noting it is unverified on consumer Blackwell
    - Roofline breakpoints calculated with wrong bandwidth (e.g., using theoretical instead of noting it as theoretical)
    - LLM section written generically without RTX 5090-specific bandwidth/VRAM constraints
  failure_modes_to_watch:
    - Copy-paste from B200 guide without updating numbers
    - Assuming sm_120 has same features as sm_100 without verification
    - Writing occupancy examples with B200 limits (64 warps, 32 blocks, 228 KB shared)
  done_condition: >
    All acceptance criteria pass. All deterministic checks pass.
    Programming guide LLM section references RTX 5090 bandwidth (~1.8 TB/s),
    VRAM (32 GB), and sm_120 occupancy limits. tcgen05/TMEM/2CTA status documented.
  handoff_requirements:
    - SKILL.md has complete RTX 5090 hardware spec table
    - Programming guide is self-consistent and references sm_120 throughout
    - Any unresolved questions about tcgen05/TMEM/2CTA are documented as "needs validation in Session 3"
    - README.md reflects RTX 5090 targeting
  eval_seed_candidates:
    - Verify SM count is 170 (not 148) in SKILL.md hardware table
    - Verify shared memory per SM is 100 KB (not 228 KB) in programming guide
    - Verify compile target is sm_120 (not sm_100) in all examples
    - Verify no HBM references remain in programming guide
    - Verify LLM section discusses decode memory-bandwidth bottleneck
